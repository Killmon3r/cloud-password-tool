<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 420px;
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: #60a5fa;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        /* PASSWORD STRENGTH BAR */
        .progress {
            width: 100%;
            height: 8px;
            background: #374151;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar {
            height: 100%;
            width: 0%;
            transition: 0.3s;
        }

        .weak { background: #ef4444; }
        .medium { background: #f59e0b; }
        .strong { background: #22c55e; }

        #strengthText {
            font-size: 12px;
            margin-top: 5px;
            color: #94a3b8;
        }

        .small-btn {
            width: 60px;
            padding: 6px;
            font-size: 12px;
            background: #374151;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 5px;
        }

        .small-btn:hover {
            background: #4b5563;
        }

        button.main-btn {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button.main-btn:hover {
            background: #16a34a;
        }

        a {
            color: #60a5fa;
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password" oninput="checkStrength()">

    <!-- STRENGTH BAR -->
    <div class="progress">
        <div id="strengthBar" class="bar"></div>
    </div>
    <div id="strengthText"></div>

    <!-- EYE BUTTON -->
    <button class="small-btn" onclick="togglePassword('password')">👁 Show</button>

    <!-- MAIN BUTTON -->
    <button class="main-btn" onclick="register()">Register</button>

    <div id="result"></div>

    <a href="/login-page">Already have an account? Login</a>
</div>

<script src="/static/js/main.js"></script>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

// PASSWORD STRENGTH LOGIC
function checkStrength() {
    const password = document.getElementById("password").value;

    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[!@#$%^&*()_+]/.test(password)) strength++;

    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");

    let width = (strength / 5) * 100;
    bar.style.width = width + "%";

    bar.className = "bar";

    if (strength <= 2) {
        bar.classList.add("weak");
        text.innerText = "Weak password";
    } else if (strength <= 4) {
        bar.classList.add("medium");
        text.innerText = "Medium strength";
    } else {
        bar.classList.add("strong");
        text.innerText = "Strong password";
    }
}
</script>

</body>
</html>
