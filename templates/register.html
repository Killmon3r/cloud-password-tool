<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 420px;
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: #60a5fa;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        .small-btn {
            width: 60px;
            padding: 6px;
            font-size: 12px;
            background: #374151;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .small-btn:hover {
            background: #4b5563;
        }

        button.main-btn {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button.main-btn:hover {
            background: #16a34a;
        }

        a {
            color: #60a5fa;
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
        }

        #result {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <!-- 👁 TOGGLE ABOVE MAIN BUTTON -->
    <button class="small-btn" onclick="togglePassword('password')">👁 Show</button>

    <button class="main-btn" onclick="register()">Register</button>

    <div id="result"></div>

    <a href="/login-page">Already have an account? Login</a>
</div>

<script src="/static/js/main.js"></script>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
