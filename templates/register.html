<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card p-4 shadow">

            <h2 class="text-center mb-4">Register</h2>

            <input class="form-control mb-3" type="text" id="username" placeholder="Username">
            <input class="form-control mb-3" type="email" id="email" placeholder="Email">

            <div class="input-group mb-3">
                <input class="form-control" type="password" id="password" placeholder="Password"
                    oninput="checkStrength()">
                <button class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>
            </div>

            <div class="progress mb-2">
                <div id="strengthBar" class="progress-bar"></div>
            </div>

            <p id="strengthText"></p>

            <button class="btn btn-success w-100" onclick="register()">Register</button>

            <p id="result" class="mt-3 text-center"></p>

            <div class="text-center mt-3">
                <a href="/login-page">Already have an account? Login</a>
            </div>

        </div>

    </div>

    <script>
        function togglePassword() {
            let field = document.getElementById("password");
            field.type = field.type === "password" ? "text" : "password";
        }

        function checkStrength() {
            let password = document.getElementById("password").value;
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*()_+]/.test(password)) strength++;

            let bar = document.getElementById("strengthBar");
            let text = document.getElementById("strengthText");

            let width = (strength / 5) * 100;
            bar.style.width = width + "%";

            if (strength <= 2) {
                bar.className = "progress-bar bg-danger";
                text.innerText = "Weak Password";
            } else if (strength <= 4) {
                bar.className = "progress-bar bg-warning";
                text.innerText = "Medium Password";
            } else {
                bar.className = "progress-bar bg-success";
                text.innerText = "Strong Password";
            }
        }
    </script>

    <!-- IMPORTANT: correct Flask static path -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
