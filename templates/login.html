<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card p-4 shadow">
            <h2 class="text-center mb-4">Login</h2>

            <input class="form-control mb-3" type="email" id="email" placeholder="Email">

            <div class="input-group mb-3">
                <input class="form-control" type="password" id="password" placeholder="Password">
                <button class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>
            </div>

            <input class="form-control mb-3" type="text" id="otp" placeholder="OTP (if MFA enabled)">

            <button class="btn btn-primary w-100" onclick="login()">Login</button>

            <p id="result" class="mt-3 text-center"></p>

            <div class="text-center mt-3">
                <a href="/register-page">Register</a> |
                <a href="/reset-page">Forgot Password?</a>
            </div>
        </div>

    </div>

    <script>
        function togglePassword() {
            let field = document.getElementById("password");
            field.type = field.type === "password" ? "text" : "password";
        }
    </script>

    <script src="/static/js/main.js"></script>

</body>

</html>
