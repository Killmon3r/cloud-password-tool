<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 400px;
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: #60a5fa;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        a {
            color: #60a5fa;
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
        }

        #result {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #60a5fa;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email">

    <div class="password-wrapper">
        <input id="password" type="password" placeholder="Password">
        <button type="button" class="toggle-btn" onclick="togglePassword()">👁</button>
    </div>

    <button onclick="login()">Login</button>

    <div id="result"></div>

    <a href="/reset-page">Forgot Password?</a>
    <a href="/register-page">Create account</a>
</div>

<script>
function togglePassword() {
    const field = document.getElementById("password");
    field.type = field.type === "password" ? "text" : "password";
}
</script>

<script src="/static/js/main.js"></script>

</body>
</html>
