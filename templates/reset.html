<!DOCTYPE html>
<html>

<head>
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card p-4 shadow">
            <h2 class="text-center mb-4">Reset Password</h2>

            <input class="form-control mb-3" id="token" placeholder="Enter reset token">

            <div class="input-group mb-3">
                <input class="form-control" id="new_password" type="password" placeholder="New password">
                <button class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>
            </div>

            <button class="btn btn-danger w-100" onclick="resetPassword()">Reset Password</button>
        </div>

    </div>

    <script>
        function togglePassword() {
            let field = document.getElementById("new_password");
            field.type = field.type === "password" ? "text" : "password";
        }

        function resetPassword() {
            fetch("http://127.0.0.1:5000/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    token: document.getElementById("token").value,
                    new_password: document.getElementById("new_password").value
                })
            })
                .then(res => res.json())
                .then(data => alert(JSON.stringify(data)))
        }
    </script>

</body>

</html>
