<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Reset Password</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 420px;
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: #60a5fa;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ef4444;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #dc2626;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #60a5fa;
            font-size: 14px;
            cursor: pointer;
        }

        #result {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #94a3b8;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Reset Password</h2>

    <input id="token" placeholder="Reset token">

    <div class="password-wrapper">
        <input id="new_password" type="password" placeholder="New password">
        <button type="button" class="toggle-btn" onclick="togglePassword()">👁</button>
    </div>

    <button onclick="resetPassword()">Reset Password</button>

    <div id="result"></div>

    <a href="/login-page">Back to Login</a>
</div>

<script>
function togglePassword() {
    const field = document.getElementById("new_password");
    field.type = field.type === "password" ? "text" : "password";
}

async function resetPassword() {
    const res = await fetch("https://cloud-password-tool.onrender.com/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            token: document.getElementById("token").value,
            new_password: document.getElementById("new_password").value
        })
    });

    const data = await res.json();
    document.getElementById("result").innerText = data.message || data.error;
}
</script>

</body>
</html>
