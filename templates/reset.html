<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Reset Password</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 420px;
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: #60a5fa;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        .small-btn {
            width: 60px;
            padding: 6px;
            font-size: 12px;
            background: #374151;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .small-btn:hover {
            background: #4b5563;
        }

        button.main-btn {
            width: 100%;
            padding: 10px;
            background: #ef4444;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button.main-btn:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Reset Password</h2>

    <input id="token" placeholder="Reset token">
    <input id="new_password" type="password" placeholder="New password">

    <!-- 👁 TOGGLE ABOVE MAIN BUTTON -->
    <button class="small-btn" onclick="togglePassword('new_password')">👁 Show</button>

    <button class="main-btn" onclick="resetPassword()">Reset Password</button>
</div>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function resetPassword() {
    fetch("https://cloud-password-tool.onrender.com/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            token: document.getElementById("token").value,
            new_password: document.getElementById("new_password").value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message || data.error))
}
</script>

</body>
</html>
